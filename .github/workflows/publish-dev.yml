name: Publish dev
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'

permissions:
  contents: read

concurrency:
  group: publish-dev
  cancel-in-progress: false

jobs:
  npm:
    name: npm
    runs-on: ubuntu-latest
    if: github.repository_owner == 'wolvesvillejs'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/
          cache: npm

      - name: Check previous released version
        id: pre-release
        run: |
          DEV_VERSION=$(npm view wolvesville.js@dev version 2>/dev/null || true)
          PKG_VERSION=$(jq --raw-output '.version' package.json)
          SHORT_SHA=$(git rev-parse --short HEAD)
          if echo "$DEV_VERSION" | grep -q "${PKG_VERSION}.*-${SHORT_SHA}"; then
            echo "release=false" >> $GITHUB_OUTPUT
          else
            echo "release=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        if: steps.pre-release.outputs.release == 'true'
        run: npm ci

      - name: Publish
        if: steps.pre-release.outputs.release == 'true'
        run: |
          npm version --no-git-tag-version $(jq --raw-output '.version' package.json).$(date +%s)-$(git rev-parse --short HEAD)
          npm publish --tag dev
        env:
          NODE_AUTH_TOKEN: ${{ secrets.WJS_PUBLISH }}
