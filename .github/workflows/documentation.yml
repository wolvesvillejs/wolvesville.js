name: Documentation
on:
  push:
    branches:
      - 'main'
      - 'stable'
    tags:
      - '**'

permissions:
  contents: read

concurrency:
  group: documentation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build documentation
    runs-on: ubuntu-latest
    if: github.repository_owner == 'wolvesvillejs'
    outputs:
      BRANCH_NAME: ${{ steps.env.outputs.BRANCH_NAME }}
      BRANCH_OR_TAG: ${{ steps.env.outputs.BRANCH_OR_TAG }}
      SHA: ${{ steps.env.outputs.SHA }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build docs
        run: npm run docs

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docs
          path: docs/docs.json
          retention-days: 1

      - name: Set outputs for upload job
        id: env
        run: |
          echo "BRANCH_NAME=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          echo "BRANCH_OR_TAG=${GITHUB_REF_TYPE}" >> $GITHUB_OUTPUT
          echo "SHA=${GITHUB_SHA}" >> $GITHUB_OUTPUT

  upload:
    name: Upload Documentation
    needs: build
    runs-on: ubuntu-latest
    if: github.repository_owner == 'wolvesvillejs'
    env:
      BRANCH_NAME: ${{ needs.build.outputs.BRANCH_NAME }}
      BRANCH_OR_TAG: ${{ needs.build.outputs.BRANCH_OR_TAG }}
      SHA: ${{ needs.build.outputs.SHA }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: docs
          path: docs

      - name: Checkout docs repository
        uses: actions/checkout@v4
        with:
          repository: 'wolvesvillejs/docs'
          token: ${{ secrets.WJS_DOCS }}
          path: 'out'

      - name: Extract semver from tag
        if: env.BRANCH_OR_TAG == 'tag'
        id: semver
        run: |
          SEMVER=$(echo "${BRANCH_NAME}" | grep -oP '\d+\.\d+\.\d+')
          echo "value=${SEMVER}" >> $GITHUB_OUTPUT

      - name: Move docs to correct directory (tag)
        if: env.BRANCH_OR_TAG == 'tag'
        run: |
          mkdir -p out/wolvesville.js
          mv docs/docs.json out/wolvesville.js/${{ steps.semver.outputs.value }}.json

      - name: Move docs to correct directory (branch)
        if: env.BRANCH_OR_TAG == 'branch'
        run: |
          mkdir -p out/wolvesville.js
          mv docs/docs.json out/wolvesville.js/${BRANCH_NAME}.json

      - name: Commit and push
        run: |
          cd out
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .
          git commit -m "Docs build for ${BRANCH_OR_TAG} ${BRANCH_NAME}: ${SHA}" || true
          git push
